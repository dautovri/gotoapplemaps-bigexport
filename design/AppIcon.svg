<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF453A"/>
      <stop offset="1" stop-color="#D70015"/>
    </linearGradient>
    <path id="pin" fill-rule="evenodd"
          d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z
             M12 11.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"/>
    <mask id="cut">
      <rect x="0" y="0" width="1024" height="1024" fill="white"/>
      <use href="#pin" fill="black" transform="translate(194,182) scale(26.5)"/>
    </mask>
  </defs>

  <!-- full-bleed squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- back pins (masked so the front pin carves a clean gap) -->
  <g fill="#FFFFFF" mask="url(#cut)">
    <use href="#pin" transform="translate(98,168) scale(16)"/>
    <use href="#pin" transform="translate(542,168) scale(16)"/>
  </g>
  <!-- front-center pin -->
  <use href="#pin" fill="#FFFFFF" transform="translate(212,200) scale(25)"/>
</svg>
