name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KCH_PATH="$RUNNER_TEMP/build.keychain"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KCH_PATH"
          security default-keychain -s "$KCH_PATH"
          security unlock-keychain -p "" "$KCH_PATH"
          security import "$CERT_PATH" -k "$KCH_PATH" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KCH_PATH"
          security set-keychain-settings -lut 7200 "$KCH_PATH"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        run: |
          xcodebuild -project BigExport.xcodeproj \
            -scheme BigExport \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/BigExport.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Developer ID Application: Ruslan Dautov (27EZNUVV57)" \
            DEVELOPMENT_TEAM=27EZNUVV57

      - name: Export .app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/BigExport.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist

      - name: Create DMG
        run: |
          npm install -g create-dmg
          VERSION="${GITHUB_REF_NAME#v}"
          create-dmg \
            --overwrite \
            --dmg-title "BigExport $VERSION" \
            "$RUNNER_TEMP/export/BigExport.app" \
            "$RUNNER_TEMP/"
          # create-dmg names it "AppName Version.dmg"
          mv "$RUNNER_TEMP/BigExport $VERSION.dmg" "$RUNNER_TEMP/BigExport-$VERSION.dmg" 2>/dev/null || \
            mv "$RUNNER_TEMP"/BigExport*.dmg "$RUNNER_TEMP/BigExport-$VERSION.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="$RUNNER_TEMP/BigExport-$VERSION.dmg"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait --timeout 10m
          xcrun stapler staple "$DMG"

      - name: Compute SHA256
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 "$RUNNER_TEMP/BigExport-$VERSION.dmg" | awk '{print $1}')
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "$RUNNER_TEMP/BigExport-$VERSION.dmg" .
          gh release create "$GITHUB_REF_NAME" \
            "BigExport-$VERSION.dmg" \
            --title "BigExport $VERSION" \
            --generate-notes

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:$TAP_TOKEN@github.com/dautovri/homebrew-tap.git" tap
          mkdir -p tap/Casks
          cat > tap/Casks/bigexport.rb << CASK
cask "bigexport" do
  version "$VERSION"
  sha256 "$SHA256"

  url "https://github.com/dautovri/gotoapplemaps-bigexport/releases/download/v#{version}/BigExport-#{version}.dmg"
  name "BigExport"
  desc "Import thousands of saved places from Google Maps, CSV, or KML into Apple Maps"
  homepage "https://gotoapplemaps.com"

  app "BigExport.app"

  zap trash: [
    "~/Library/Preferences/com.GoToAppleMaps.BigExport.plist",
  ]
end
CASK
          cd tap
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Casks/bigexport.rb
          git commit -m "bigexport $VERSION"
          git push
