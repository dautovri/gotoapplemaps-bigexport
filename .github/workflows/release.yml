name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KCH_PATH="$RUNNER_TEMP/build.keychain"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KCH_PATH"
          security default-keychain -s "$KCH_PATH"
          security unlock-keychain -p "" "$KCH_PATH"
          security import "$CERT_PATH" -k "$KCH_PATH" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KCH_PATH"
          security set-keychain-settings -lut 7200 "$KCH_PATH"

      - name: Select newest Xcode on runner
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          swift --version | head -1

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcodebuild -project BigExport.xcodeproj \
            -scheme BigExport \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/BigExport.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Developer ID Application: Ruslan Dautov (27EZNUVV57)" \
            DEVELOPMENT_TEAM=27EZNUVV57 \
            MARKETING_VERSION="$VERSION"

      - name: Export .app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/BigExport.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize and staple the app
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          APP="$RUNNER_TEMP/export/BigExport.app"
          KEY="$RUNNER_TEMP/AuthKey.p8"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$KEY"
          # notarytool needs an archive container, not a bare .app
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/app.zip"
          xcrun notarytool submit "$RUNNER_TEMP/app.zip" \
            --key "$KEY" --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID" \
            --wait --timeout 15m
          rm -f "$KEY"
          # staple the ticket onto the app so it passes Gatekeeper offline
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Create and sign DMG (from stapled app)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p "$RUNNER_TEMP/dmgroot"
          cp -R "$RUNNER_TEMP/export/BigExport.app" "$RUNNER_TEMP/dmgroot/"
          ln -s /Applications "$RUNNER_TEMP/dmgroot/Applications"
          hdiutil create -volname "BigExport" -srcfolder "$RUNNER_TEMP/dmgroot" \
            -ov -format UDZO "$RUNNER_TEMP/BigExport-$VERSION.dmg"
          codesign --force \
            --sign "Developer ID Application: Ruslan Dautov (27EZNUVV57)" \
            "$RUNNER_TEMP/BigExport-$VERSION.dmg"

      - name: Notarize and staple the DMG
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="$RUNNER_TEMP/BigExport-$VERSION.dmg"
          KEY="$RUNNER_TEMP/AuthKey.p8"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$KEY"
          xcrun notarytool submit "$DMG" \
            --key "$KEY" --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID" \
            --wait --timeout 15m
          rm -f "$KEY"
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Compute SHA256
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 "$RUNNER_TEMP/BigExport-$VERSION.dmg" | awk '{print $1}')
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "$RUNNER_TEMP/BigExport-$VERSION.dmg" .
          gh release create "$GITHUB_REF_NAME" \
            "BigExport-$VERSION.dmg" \
            --title "BigExport $VERSION" \
            --generate-notes

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:$TAP_TOKEN@github.com/dautovri/homebrew-tap.git" tap
          mkdir -p tap/Casks
          {
            echo 'cask "bigexport" do'
            echo "  version \"$VERSION\""
            echo "  sha256 \"$SHA256\""
            echo ''
            echo '  url "https://github.com/dautovri/gotoapplemaps-bigexport/releases/download/v#{version}/BigExport-#{version}.dmg"'
            echo '  name "BigExport"'
            echo '  desc "Import thousands of saved places from Google Maps, CSV, KML, GPX into Apple Maps"'
            echo '  homepage "https://gotoapplemaps.com"'
            echo ''
            echo '  app "BigExport.app"'
            echo ''
            echo '  zap trash: ['
            echo '    "~/Library/Preferences/com.GoToAppleMaps.BigExport.plist",'
            echo '  ]'
            echo 'end'
          } > tap/Casks/bigexport.rb
          cd tap
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Casks/bigexport.rb
          git commit -m "bigexport $VERSION"
          git push
