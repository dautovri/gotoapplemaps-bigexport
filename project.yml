name: BigExport
options:
  bundleIdPrefix: com.GoToAppleMaps
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 27EZNUVV57

targets:
  BigExport:
    type: application
    platform: macOS
    sources:
      - path: BigExport
    info:
      path: BigExport/Info.plist
      properties:
        CFBundleName: BigExport
        CFBundleDisplayName: BigExport
        CFBundleIdentifier: com.GoToAppleMaps.BigExport
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSMinimumSystemVersion: "15.0"
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: false
        NSApplicationSupportsSecureRestorableState: YES
        com.apple.security.app-sandbox: false
        NSDocumentsFolderUsageDescription: "BigExport reads place data files from your Documents folder."
    settings:
      base:
        PRODUCT_NAME: BigExport
        PRODUCT_BUNDLE_IDENTIFIER: com.GoToAppleMaps.BigExport
        INFOPLIST_FILE: BigExport/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
